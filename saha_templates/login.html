<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a6b3a">
<title>Giriş - Meydan Saha</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(160deg, #1a6b3a 0%, #28a745 60%, #20c997 100%);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 20px;
  padding: 36px 28px;
  width: 100%; max-width: 380px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.logo { text-align: center; margin-bottom: 28px; }
.logo-icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #1a6b3a, #28a745);
  border-radius: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 32px; color: white;
  box-shadow: 0 6px 20px rgba(40,167,69,0.4);
  margin-bottom: 14px;
}
.logo h1 { font-size: 22px; font-weight: 700; color: #1a6b3a; }
.logo p { font-size: 13px; color: #888; margin-top: 4px; }
label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
input {
  width: 100%; padding: 14px 16px;
  border: 2px solid #e8e8e8; border-radius: 12px;
  font-size: 16px; outline: none; transition: border-color 0.2s;
  -webkit-appearance: none;
}
input:focus { border-color: #28a745; }
.field { margin-bottom: 18px; }
.btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #1a6b3a, #28a745);
  color: white; border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  margin-top: 8px;
  box-shadow: 0 4px 15px rgba(40,167,69,0.35);
  transition: transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.error {
  background: #fff3f3; border: 1px solid #f5c6cb;
  color: #721c24; border-radius: 10px; padding: 12px 14px;
  font-size: 14px; margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Meydan Elektrik</h1>
    <p>Saha Ekibi Paneli</p>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label>Kullanıcı Adı</label>
      <input type="text" name="kullanici_adi" placeholder="kullanici_adi"
             autocomplete="username" autocapitalize="none" required>
    </div>
    <div class="field">
      <label>Şifre</label>
      <input type="password" name="sifre" placeholder="••••••••"
             autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">Giriş Yap</button>
  </form>
</div>
</body>
</html>
